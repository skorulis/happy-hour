name: Deploy production

on:
  push:
    tags:
      - "release/*"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and test
        run: |
          npm ci
          npm test

  build_and_push:
    runs-on: ubuntu-latest
    needs: test
    env:
      WEB_IMAGE_REPO: ${{ secrets.PROD_WEB_IMAGE_REPO }}
      MIGRATE_IMAGE_REPO: ${{ secrets.PROD_MIGRATE_IMAGE_REPO }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PROD_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
      NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID: ${{ secrets.PROD_NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG for registry (Docker tags cannot contain '/')
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "IMAGE_TAG=${tag//\//-}" >> "${GITHUB_ENV}"
          echo "APP_VERSION=${tag#release/}" >> "${GITHUB_ENV}"

      - name: Validate required secrets
        run: |
          test -n "${WEB_IMAGE_REPO}" || (echo "Missing secret: PROD_WEB_IMAGE_REPO" && exit 1)
          test -n "${MIGRATE_IMAGE_REPO}" || (echo "Missing secret: PROD_MIGRATE_IMAGE_REPO" && exit 1)
          test -n "${NEXT_PUBLIC_SITE_URL}" || (echo "Missing secret: PROD_NEXT_PUBLIC_SITE_URL" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          target: runner
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}
            NEXT_PUBLIC_APP_VERSION=${{ env.APP_VERSION }}
          tags: |
            ${{ env.WEB_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE_REPO }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          target: migrate
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}
            NEXT_PUBLIC_APP_VERSION=${{ env.APP_VERSION }}
          tags: |
            ${{ env.MIGRATE_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.MIGRATE_IMAGE_REPO }}:latest
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      WEB_IMAGE_REPO: ${{ secrets.PROD_WEB_IMAGE_REPO }}
      MIGRATE_IMAGE_REPO: ${{ secrets.PROD_MIGRATE_IMAGE_REPO }}
      GHCR_USERNAME: ${{ secrets.PROD_GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.PROD_GHCR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG for registry (Docker tags cannot contain '/')
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "IMAGE_TAG=${tag//\//-}" >> "${GITHUB_ENV}"

      - name: Validate server secrets
        run: |
          test -n "${{ secrets.PROD_SERVER_HOST }}" || (echo "Missing secret: PROD_SERVER_HOST" && exit 1)
          test -n "${{ secrets.PROD_SERVER_USER }}" || (echo "Missing secret: PROD_SERVER_USER" && exit 1)
          test -n "${{ secrets.PROD_SERVER_SSH_KEY }}" || (echo "Missing secret: PROD_SERVER_SSH_KEY" && exit 1)

      - name: Copy deploy bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          source: "deploy/compose.production.yml,deploy/Caddyfile,deploy/.env.production.example,deploy/scripts/*"
          target: "/opt/happy-hour"
          overwrite: true
          strip_components: 1

      - name: Deploy tag on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script_stop: true
          envs: IMAGE_TAG,WEB_IMAGE_REPO,MIGRATE_IMAGE_REPO,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            mkdir -p /opt/happy-hour/deploy/scripts
            cp -f /opt/happy-hour/scripts/*.sh /opt/happy-hour/deploy/scripts/
            cp -f /opt/happy-hour/compose.production.yml /opt/happy-hour/deploy/compose.production.yml
            cp -f /opt/happy-hour/Caddyfile /opt/happy-hour/deploy/Caddyfile
            if [ ! -f /opt/happy-hour/deploy/.env.production ]; then
              cp /opt/happy-hour/.env.production.example /opt/happy-hour/deploy/.env.production
              echo "Created /opt/happy-hour/deploy/.env.production from example."
              echo "Fill real values then re-run deploy."
              exit 1
            fi
            chmod +x /opt/happy-hour/deploy/scripts/*.sh
            /opt/happy-hour/deploy/scripts/deploy-release.sh
